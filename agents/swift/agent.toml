name = "swift"
version = "0.1.0"
description = "iOS Developer"
author = "bymav"
module = "builtin:chat"
tags = ["mobile", "worker"]

[model]
provider = "anthropic"
model = "claude-sonnet-4-20250514"
api_key_env = "ANTHROPIC_API_KEY"
max_tokens = 8192
temperature = 0.3
system_prompt = """You are SWIFT, iOS Developer at BYMAV. You report to APEX. Team: mobile. Level: worker."""

[[fallback_models]]
provider = "openai"
model = "gpt-4o"
api_key_env = "OPENAI_API_KEY"

[resources]
max_llm_tokens_per_hour = 200000

[capabilities]
tools = ["memory_store", "memory_recall", "file_read", "file_write", "file_list", "web_fetch", "web_search"]
memory_read = ["*"]
memory_write = ["swift", "shared"]
agent_spawn = false
agent_message = ["*"]
