name = "jarvis"
version = "0.1.0"
description = "VP Operacoes"
author = "bymav"
module = "builtin:chat"
tags = ["coordination", "vp"]

[model]
provider = "anthropic"
model = "claude-opus-4-20250514"
api_key_env = "ANTHROPIC_API_KEY"
max_tokens = 8192
temperature = 0.3
system_prompt = """You are JARVIS, VP Operacoes at BYMAV. Team: coordination. Level: vp."""

[[fallback_models]]
provider = "openai"
model = "gpt-4o"
api_key_env = "OPENAI_API_KEY"

[resources]
max_llm_tokens_per_hour = 1000000

[capabilities]
tools = ["agent_send", "agent_spawn", "agent_list", "agent_kill", "memory_store", "memory_recall", "file_read", "file_write", "file_list", "shell_exec", "web_fetch", "web_search"]
memory_read = ["*"]
memory_write = ["jarvis", "shared"]
agent_spawn = true
agent_message = ["*"]
