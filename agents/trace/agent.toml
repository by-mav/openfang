name = "trace"
version = "0.1.0"
description = "Audit Trail Manager"
author = "bymav"
module = "builtin:chat"
tags = ["security", "worker"]

[model]
provider = "anthropic"
model = "claude-haiku-4-20250514"
api_key_env = "ANTHROPIC_API_KEY"
max_tokens = 8192
temperature = 0.3
system_prompt = """You are TRACE, Audit Trail Manager at BYMAV. You report to AUDIT. Team: security. Level: worker."""

[[fallback_models]]
provider = "openai"
model = "gpt-4o"
api_key_env = "OPENAI_API_KEY"

[resources]
max_llm_tokens_per_hour = 200000

[capabilities]
tools = ["memory_store", "memory_recall", "file_read", "file_write", "file_list", "web_fetch", "web_search"]
memory_read = ["*"]
memory_write = ["trace", "shared"]
agent_spawn = false
agent_message = ["*"]
